name: lint

on:
  # Skip config-only changes: the deploy descriptor, release pointer and docs don't touch the
  # Go binary, so there is nothing here to re-check. service.yaml still triggers an image build
  # in build-image.yml, so every release-pointable commit stays deployable.
  push:
    branches: [ master ]
    paths-ignore:
      - 'service.yaml'
      - 'version.yaml'
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - 'service.yaml'
      - 'version.yaml'
      - '**/*.md'

permissions:
  contents: read

jobs:
  fmtcheck:
    name: go fmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: false
      - name: go fmt check
        run: make fmtcheck

  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=10m --color=always

  goimports:
    runs-on: ubuntu-latest
    name: goimports check
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: goimports check
        uses: DarthBenro008/goimports-check-action@v0.2.0
        with:
          root-path: './' # The relative root path to run goimports
          excludes: "./yacc/"