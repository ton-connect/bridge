name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  unit:
     name: unit
     runs-on: ubuntu-latest
     steps:

     - name: Check out code
       uses: actions/checkout@v7

     - name: Set up Go
       uses: actions/setup-go@v6
       with:
         go-version: '1.26.0'

     - name: unit tests
       run: make test

  integration:
    name: integration-${{ matrix.storage }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        storage: [memory, postgres, nginx, dnsmasq, cluster-valkey]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Start bridge
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml up --build -d bridge

    - name: Run bridge-sdk tests
      id: bridge_sdk_tests
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm integration || rc=$?
        rc=${rc:-0}
        echo "sdk_rc=$rc" >> $GITHUB_OUTPUT
        if [ $rc -ne 0 ]; then
          echo "Bridge SDK tests failed with exit code $rc"
        fi

    - name: Run go-integration tests
      id: go_integration_tests
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm gointegration || rc=$?
        rc=${rc:-0}
        echo "go_rc=$rc" >> $GITHUB_OUTPUT
        if [ $rc -ne 0 ]; then
          echo "Go integration tests failed with exit code $rc"
        fi

    - name: Clean up containers
      if: always()
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml down -v

    - name: Fail job if any tests failed
      if: ${{ fromJSON(steps.bridge_sdk_tests.outputs.sdk_rc) != 0 || fromJSON(steps.go_integration_tests.outputs.go_rc) != 0 }}
      run: |
        echo "Test failures detected:"
        echo "  Bridge SDK tests: exit code ${{ steps.bridge_sdk_tests.outputs.sdk_rc }}"
        echo "  Go integration tests: exit code ${{ steps.go_integration_tests.outputs.go_rc }}"
        exit 1

  metrics:
    name: metrics-${{ matrix.storage }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        storage: [memory, postgres, nginx, dnsmasq, cluster-valkey]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Collect PR branch metrics (5 runs avg)
      run: |
        ./scripts/pr-metrics-avg.sh "${{ matrix.storage }}" \
          "docker/docker-compose.${{ matrix.storage }}.yml" 5 \
          "./scripts/pr-metrics.sh" > metrics-${{ matrix.storage }}-pr.json

    - name: Upload PR metrics
      uses: actions/upload-artifact@v7
      with:
        name: metrics-${{ matrix.storage }}-pr
        path: metrics-${{ matrix.storage }}-pr.json
        retention-days: 1

    - name: Save metrics scripts
      run: |
        cp scripts/pr-metrics.sh /tmp/pr-metrics.sh
        cp scripts/pr-metrics-avg.sh /tmp/pr-metrics-avg.sh

    - name: Checkout master
      uses: actions/checkout@v7
      with:
        ref: master
        clean: false

    - name: Collect master branch metrics (5 runs avg)
      run: |
        /tmp/pr-metrics-avg.sh "${{ matrix.storage }}" \
          "docker/docker-compose.${{ matrix.storage }}.yml" 5 \
          "/tmp/pr-metrics.sh" > metrics-${{ matrix.storage }}-base.json

    - name: Upload master metrics
      uses: actions/upload-artifact@v7
      with:
        name: metrics-${{ matrix.storage }}-base
        path: metrics-${{ matrix.storage }}-base.json
        retention-days: 1

  metrics-comment:
    name: metrics-comment
    if: github.event_name == 'pull_request' && always()
    needs: metrics
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Download all metrics artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: metrics-*
        path: metrics

    - name: Generate comparison table
      run: |
        ./scripts/pr-metrics-compare.sh metrics > metrics-comment.md

    - name: Post comparison comment
      continue-on-error: true
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const table = fs.readFileSync('metrics-comment.md', 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const marker = '<!-- metrics-comparison -->';
          const body = `${marker}\n# 📊 Performance Metrics — PR vs main\n\n${table}\n`;
          const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
          }
