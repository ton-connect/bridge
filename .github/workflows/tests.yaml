name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]


jobs:
  unit:
     name: unit
     runs-on: ubuntu-latest
     steps:

     - name: Check out code
       uses: actions/checkout@v6

     - name: Set up Go
       uses: actions/setup-go@v6
       with:
         go-version: '1.26.0'

     - name: unit tests
       run: make test

  integration:
    name: integration-${{ matrix.storage }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        storage: [memory, postgres, nginx, dnsmasq, cluster-valkey]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start bridge
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml up --build -d bridge

    - name: Run bridge-sdk tests
      id: bridge_sdk_tests
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm integration || rc=$?
        rc=${rc:-0}
        echo "sdk_rc=$rc" >> $GITHUB_OUTPUT
        if [ $rc -ne 0 ]; then
          echo "Bridge SDK tests failed with exit code $rc"
        fi

    - name: Run go-integration tests
      id: go_integration_tests
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm gointegration || rc=$?
        rc=${rc:-0}
        echo "go_rc=$rc" >> $GITHUB_OUTPUT
        if [ $rc -ne 0 ]; then
          echo "Go integration tests failed with exit code $rc"
        fi

    - name: Clean up containers
      if: always()
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml down -v

    - name: Fail job if any tests failed
      if: ${{ fromJSON(steps.bridge_sdk_tests.outputs.sdk_rc) != 0 || fromJSON(steps.go_integration_tests.outputs.go_rc) != 0 }}
      run: |
        echo "Test failures detected:"
        echo "  Bridge SDK tests: exit code ${{ steps.bridge_sdk_tests.outputs.sdk_rc }}"
        echo "  Go integration tests: exit code ${{ steps.go_integration_tests.outputs.go_rc }}"
        exit 1

  metrics:
    name: metrics-${{ matrix.storage }}-run${{ matrix.run }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        storage: [memory, postgres, nginx, dnsmasq, cluster-valkey]
        run: [1, 2, 3, 4, 5]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start bridge (PR)
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml up --build -d bridge

    - name: Run tests (PR)
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm gointegration || true

    - name: Collect PR metrics
      run: |
        ./scripts/pr-metrics.sh "${{ matrix.storage }}" localhost 9103 json > metrics-${{ matrix.storage }}-run${{ matrix.run }}-pr.json

    - name: Upload PR metrics
      uses: actions/upload-artifact@v5
      with:
        name: metrics-${{ matrix.storage }}-run${{ matrix.run }}-pr
        path: metrics-${{ matrix.storage }}-run${{ matrix.run }}-pr.json
        retention-days: 1

    - name: Clean up PR containers
      if: always()
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml down -v

    - name: Save metrics script
      run: cp scripts/pr-metrics.sh /tmp/pr-metrics.sh

    - name: Checkout master
      uses: actions/checkout@v6
      with:
        ref: master
        clean: false

    - name: Start bridge (master)
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml up --build -d bridge

    - name: Run tests (master)
      run: |
        docker compose -f docker/docker-compose.${{ matrix.storage }}.yml run --rm gointegration || true

    - name: Collect master metrics
      run: |
        /tmp/pr-metrics.sh "${{ matrix.storage }}" localhost 9103 json > metrics-${{ matrix.storage }}-run${{ matrix.run }}-base.json

    - name: Upload master metrics
      uses: actions/upload-artifact@v5
      with:
        name: metrics-${{ matrix.storage }}-run${{ matrix.run }}-base
        path: metrics-${{ matrix.storage }}-run${{ matrix.run }}-base.json
        retention-days: 1

    - name: Clean up master containers
      if: always()
      run: docker compose -f docker/docker-compose.${{ matrix.storage }}.yml down -v

  metrics-comment:
    name: metrics-comment
    if: github.event_name == 'pull_request' && always()
    needs: [integration, metrics]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Download all metrics artifacts
      uses: actions/download-artifact@v5
      with:
        pattern: metrics-*
        path: metrics

    - name: Average metrics across runs
      run: |
        for storage in memory postgres nginx cluster-valkey dnsmasq; do
          for branch in pr base; do
            mkdir -p "metrics/metrics-${storage}-${branch}"
            python3 -c "
        import json, glob, os

        files = sorted(glob.glob('metrics/metrics-${storage}-run*-${branch}/*.json'))
        if not files:
            print('{}')
            exit()

        all_data = [json.load(open(f)) for f in files]
        n = len(all_data)
        result = {'storage': '${storage}'}

        int_keys = {'cores','goroutines','threads','allocs_count','gc_cycles','open_fds','max_fds'}
        for key in ['cpu_seconds','cores','goroutines','threads','heap_mb','rss_mb','total_alloc_mb','allocs_count','gc_cycles','gc_avg_ms','open_fds','max_fds','fd_percent']:
            vals = [float(d.get(key, '0')) for d in all_data]
            avg = sum(vals) / n
            result[key] = str(int(round(avg))) if key in int_keys else f'{avg:.2f}'

        print(json.dumps(result))
        " > "metrics/metrics-${storage}-${branch}/metrics-${storage}-${branch}.json"
          done
        done

    - name: Generate comparison table
      run: |
        ./scripts/pr-metrics-compare.sh metrics > metrics-comment.md

    - name: Post comparison comment
      continue-on-error: true
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          const table = fs.readFileSync('metrics-comment.md', 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const marker = '<!-- metrics-comparison -->';
          const body = `${marker}\n# 📊 Performance Metrics — PR vs master\n\n${table}\n`;
          const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
          }
